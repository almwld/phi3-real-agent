name: smart_agent_app
description: Smart AI Agent running on-device
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/smart_vocab.json
    - assets/models/model_stats.json
    - assets/models/learned_patterns.json
    - assets/models/small_agent_model.tflite
    - assets/models/tokenizer.json
